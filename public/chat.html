<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Мессенджер</title>
  <link href="/output.css" rel="stylesheet">
  <script src="/socket.io/socket.io.js"></script>
</head>
<body class="h-screen bg-gray-50 flex overflow-hidden">
  <div id="sidebarOverlay" class="fixed inset-0 bg-black bg-opacity-40 z-30 hidden md:hidden" onclick="closeSidebar()"></div>
  <aside id="sidebar" class="fixed md:static inset-y-0 left-0 w-80 bg-white border-r border-gray-200 transform -translate-x-full md:translate-x-0 transition-transform duration-300 ease-in-out z-40 flex flex-col">
    <div class="bg-gradient-to-r from-blue-600 to-indigo-600 text-white">
      <div class="py-3 px-4 flex items-center justify-center">
        <div class="flex items-center justify-between w-full">
          <button onclick="closeSidebar()" class="md:hidden text-2xl">×</button>
          <h1 class="text-xl font-bold flex-1 text-center">Мессенджер</h1>
          <div class="w-6"></div>
        </div>
      </div>

      <div class="px-4 py-2 flex items-center gap-3 cursor-pointer hover:opacity-80 transition" onclick="window.location='/profile.html'">
        <img id="myAvatar" src="" alt="Avatar" class="w-10 h-10 rounded-full object-cover border-2 border-white flex-shrink-0">
        <div class="flex-1 min-w-0">
          <div id="myName" class="font-semibold truncate text-sm leading-tight">Загрузка...</div>
          <div id="myStatus" class="text-xs text-blue-100 leading-tight">Посмотреть профиль</div>
        </div>
      </div>

      <div class="h-2"></div>
    </div>

    <div class="p-3 border-b">
      <input id="searchInput" type="text" placeholder="Найти пользователя..." class="w-full px-4 py-2.5 bg-gray-100 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition">
    </div>
    <div id="chatList" class="flex-1 overflow-y-auto"></div>
  </aside>

  <div class="flex-1 flex flex-col min-w-0">
    <header id="chatHeader" class="hidden bg-white border-b shadow-sm px-6 py-3.5 flex items-center gap-4">
      <img id="chatAvatar" alt="" class="w-10 h-10 rounded-full object-cover">
      <div>
        <div id="chatTitle" class="font-semibold text-lg"></div>
        <div id="chatStatus" class="text-sm text-gray-500"></div>
      </div>
    </header>

    <header id="chatHeaderMobile" class="hidden bg-white border-b shadow-sm px-4 py-3 flex md:hidden items-center gap-3">
      <button onclick="openSidebar()" class="text-2xl text-gray-700">☰</button>
      <div class="flex items-center gap-3 flex-1 min-w-0">
        <img id="chatAvatarMobile" alt="" class="w-9 h-9 rounded-full object-cover">
        <div id="chatTitleMobile" class="font-semibold text-lg truncate"></div>
      </div>
    </header>

    <div id="messagesContainer" class="flex-1 flex flex-col items-center justify-center p-4 bg-gradient-to-br from-gray-50 to-gray-100">
      <div class="text-center max-w-md">
        <div class="text-6xl mb-4">💬</div>
        <h2 class="text-2xl font-bold text-gray-800 mb-2">Выберите диалог</h2>
        <p class="text-gray-600 mb-4">Найдите друга в списке слева или начните новый диалог</p>
        <div class="bg-white rounded-lg p-4 shadow-sm">
          <p class="text-sm text-gray-500">📝 Совет: используйте поле поиска выше для быстрого поиска контактов</p>
        </div>
      </div>
    </div>

    <div id="messages" class="hidden flex-1 p-4 md:p-6 overflow-y-auto space-y-4 bg-gray-50"></div>

    <footer id="chatFooter" class="hidden bg-white border-t p-4 flex items-center gap-3">
      <input id="messageInput" type="text" placeholder="Напишите сообщение..." class="flex-1 px-5 py-3 bg-gray-100 border border-gray-300 rounded-full focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent" onkeypress="if(event.key === 'Enter') sendMessage()">
      <button onclick="sendMessage()" class="bg-blue-600 text-white px-6 py-3 rounded-full font-medium hover:bg-blue-700 transition shadow-sm">Отправить</button>
    </footer>
  </div>

  <script src="script.js"></script>
  <script>
    async function loadCurrentUser() {
      try {
        const token = localStorage.getItem("token");
        const storedUser = JSON.parse(localStorage.getItem("user"));
        const res = await fetch("/api/user/profile", { headers: { "Authorization": `Bearer ${token}` } });
        if (!res.ok) throw new Error("Не удалось загрузить профиль");
        const user = await res.json();
        document.getElementById("myName").textContent = user.displayName || storedUser.username;
        if (user.avatar) {
          document.getElementById("myAvatar").src = user.avatar;
        } else {
          const DEFAULT_AVATAR = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect fill='%23E5E7EB' width='100' height='100'/%3E%3Ccircle cx='50' cy='35' r='15' fill='%239CA3AF'/%3E%3Cellipse cx='50' cy='75' rx='25' ry='20' fill='%239CA3AF'/%3E%3C/svg%3E";
          document.getElementById("myAvatar").src = DEFAULT_AVATAR;
        }
      } catch (err) {
        console.error("Ошибка загрузки профиля:", err);
      }
    }
    function showChatUI() {
      document.getElementById("chatHeader").classList.remove("hidden");
      document.getElementById("chatHeaderMobile").classList.remove("hidden");
      document.getElementById("messages").classList.remove("hidden");
      document.getElementById("chatFooter").classList.remove("hidden");
      document.getElementById("messagesContainer").classList.add("hidden");
    }
    function hideChatUI() {
      document.getElementById("chatHeader").classList.add("hidden");
      document.getElementById("chatHeaderMobile").classList.add("hidden");
      document.getElementById("messages").classList.add("hidden");
      document.getElementById("chatFooter").classList.add("hidden");
      document.getElementById("messagesContainer").classList.remove("hidden");
    }
    loadCurrentUser();
  </script>
</body>
</html>
